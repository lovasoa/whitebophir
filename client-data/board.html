<!DOCTYPE html>
<html lang="{{language}}"{{#moderator}} data-moderator="true"{{/moderator}}>

<head>
	<meta charset="utf-8" />
	<title>{{board}} | WBO | {{translations.collaborative_whiteboard}}</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" type="text/css" href="../board.css" />
	<link rel="modulepreload" href="../js/board_main.js" />
	<link rel="modulepreload" href="../js/board_bootstrap.js" />
	<link rel="modulepreload" href="../js/app_tools_core.js" />
	<link rel="modulepreload" href="../js/board_dom_bootstrap.js" />
	<link rel="modulepreload" href="../js/board_message_replay.js" />
	<link rel="modulepreload" href="../js/board_name.js" />
	<link rel="modulepreload" href="../js/board_page_state.js" />
	<link rel="modulepreload" href="../js/board_preferences.js" />
	<link rel="modulepreload" href="../js/board_runtime_core.js" />
	<link rel="modulepreload" href="../js/board_viewport.js" />
	<link rel="modulepreload" href="../js/frontend_logging.js" />
	<link rel="modulepreload" href="../js/message_common.js" />
	<link rel="modulepreload" href="../js/message_tool_metadata.js" />
	<link rel="modulepreload" href="../js/mutation_type.js" />
	<link rel="modulepreload" href="../js/rate_limit_common.js" />
	<link rel="modulepreload" href="../tools/manifest.js" />
	<link rel="modulepreload" href="../tools/tool-defaults.js" />
	<link rel="modulepreload" href="../tools/tool-order.js" />
	<script id="socketio-client" async src="../socket.io/socket.io.js"></script>
	<meta name="description" content="{{translations.tagline}}" />
	<meta name="keywords"
		content="{{translations.collaborative_whiteboard}},online,draw,paint,shared,realtime,wbo,whitebophir" />
	<link rel="apple-touch-icon" href="../favicon.svg">
	<link rel="icon" type="image/x-icon" sizes="16x16" href="../favicon.ico">
	<meta property="og:title" content="{{board}} board on WBO" />
	<meta property="og:url" content="{{baseUrl}}/boards/{{boardUriComponent}}" />
	<meta property="og:image" content="{{baseUrl}}/preview/{{boardUriComponent}}" />
	<link rel="canonical" href="{{canonicalUrl}}" />
	{{#languageLinks}}
	<link rel="alternate" hreflang="{{language}}" href="{{href}}" />
	{{/languageLinks}}
	{{{htmlHeadSnippet}}}
</head>

<body>
	<div id="boardHud" class="board-hud">
		<div class="board-presence">
			<button id="connectedUsersToggle" class="board-presence-toggle" type="button" aria-haspopup="true"
				aria-expanded="false">
				<img class="board-presence-icon" width="18" height="18" src="../users.svg" alt="" />
				<span class="tool-name" hidden></span>
			</button>
			<div id="connectedUsersPanel" class="connected-users-panel connected-users-panel-hidden">
				<ul id="connectedUsersList" class="connected-users-list"></ul>
			</div>
		</div>
		<div id="boardStatusIndicator" class="board-status-card" role="status" aria-live="polite" hidden>
			<span class="board-status-icon" aria-hidden="true"></span>
			<div class="board-status-copy">
				<div id="boardStatusTitle" class="board-status-title"></div>
				<div id="boardStatusNotice" class="board-status-detail board-status-detail-hidden"></div>
			</div>
		</div>
	</div>

	<div id="menu" tabindex="0" {{#hideMenu}}style="display:none;"{{/hideMenu}}>
		<div id="menuItems">
			<ul id="tools" class="tools">
				{{#tools}}
				<li class="tool disabledTool" tabindex="-1" id="toolID-{{id}}" data-tool-id="{{id}}" aria-label="{{label}}"
					aria-disabled="true">
					<img class="tool-icon" width="35" height="35" src="{{iconUrl}}" alt="" aria-hidden="true"
						fetchpriority="low" />
					<span class="tool-name">{{label}}</span>
					<img class="tool-icon secondaryIcon" width="35" height="35" src="data:," alt="" aria-hidden="true" />
				</li>
				{{/tools}}
			</ul>

			<ul class="tools" id="settings">
				<li class="tool" tabindex="-1">
					<input class="tool-icon" type="color" id="chooseColor" value="#1913B0" />
					<label class="tool-name" for="chooseColor">{{translations.color}}</label>
					<span class="colorPresets" id="colorPresetSel">
						<span class="colorPresetButton"></span>
					</span>
				</li>
				<li class="tool" tabindex="-1"
					title="{{translations.size}} ({{translations.keyboard_shortcut}}: alt + {{translations.mousewheel}})">
					<img class="tool-icon" width="60" height="60" src="../icon-size.svg" alt="" aria-hidden="true" />
					<label class="tool-name slider" for="chooseSize">
						<span>{{translations.size}}</span>
						<input type="range" id="chooseSize" value="40" min="10" max="500" step="10" class="rangeChooser" />
					</label>
				</li>
				<li class="tool" tabindex="-1">
					<span class="tool-icon">
						<svg viewBox="0 0 8 8" aria-hidden="true" focusable="false">
							<defs>
								<clipPath id="opacityIndicatorClip">
									<circle cx="4" cy="4" r="3.5"></circle>
								</clipPath>
							</defs>
							<g clip-path="url(#opacityIndicatorClip)">
								<rect x="0" y="0" width="4" height="4" fill="#111111"></rect>
								<rect x="4" y="0" width="4" height="4" fill="#eeeeee"></rect>
								<rect x="0" y="4" width="4" height="4" fill="#eeeeee"></rect>
								<rect x="4" y="4" width="4" height="4" fill="#111111"></rect>
								<circle cx="4" cy="4" id="opacityIndicatorFill" r="3.5" fill="#1913B0"></circle>
							</g>
							<circle cx="4" cy="4" id="opacityIndicator" r="3.5" fill="none" stroke="#333333" stroke-width="0.3"></circle>
						</svg>
					</span>
					<label class="tool-name slider" for="chooseOpacity">
						<span>{{translations.opacity}}</span>
						<input type="range" id="chooseOpacity" value="1" min="0.2" max="1" step="0.1"
							class="rangeChooser" />
					</label>
				</li>
				</ul>
			</div>
		</div>

	<script type="application/json" id="translations">{{{ json translations }}}</script>
	<script type="application/json" id="configuration">{{{ json configuration }}}</script>
	<script type="application/json" id="board-state">{{{ json boardState }}}</script>
	<script type="module" async src="../js/board_main.js"></script>

	<div id="board">
		{{{inlineBoardSvg}}}
	</div>
</body>

</html>
