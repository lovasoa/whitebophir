<!DOCTYPE html>
<html lang="{{language}}" data-version="{{version}}"{{#moderator}} data-moderator="true"{{/moderator}}>

<head>
	<meta charset="utf-8" />
	<title>{{board}} | WBO | {{translations.collaborative_whiteboard}}</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="stylesheet" type="text/css" href="../board.css?v={{version}}" />
	<link rel="modulepreload" href="../js/board_main.js?v={{version}}" />
	<link rel="modulepreload" href="../js/board.js?v={{version}}" />
	<link rel="modulepreload" href="../js/path-data-polyfill.js?v={{version}}" />
	<script src="../socket.io/socket.io.js"></script>
	<meta name="description" content="{{translations.tagline}}" />
	<meta name="keywords"
		content="{{translations.collaborative_whiteboard}},online,draw,paint,shared,realtime,wbo,whitebophir" />
	<link rel="apple-touch-icon" href="../favicon.svg?v={{version}}">
	<link rel="icon" type="image/x-icon" sizes="16x16" href="../favicon.ico?v={{version}}">
	<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0" />
	<meta property="og:title" content="{{board}} board on WBO" />
	<meta property="og:url" content="{{baseUrl}}/boards/{{boardUriComponent}}" />
	<meta property="og:image" content="{{baseUrl}}/preview/{{boardUriComponent}}" />
	<link rel="canonical" href="{{boardUriComponent}}?lang={{language}}" />
	{{#languages}}
	<link rel="alternate" hreflang="{{.}}" href="{{../boardUriComponent}}?lang={{.}}" />
	{{/languages}}
	{{#toolStylesheets}}
	<link rel="stylesheet" type="text/css" href="{{.}}" />
	{{/toolStylesheets}}
</head>

<body>
	<div id="loadingMessage" class="board-loading">
		<div class="board-loading-card" role="status" aria-live="polite">
			<span class="board-loading-spinner" aria-hidden="true"></span>
			<div class="board-loading-copy">
				<div class="board-loading-title">{{translations.loading}}</div>
			</div>
		</div>
	</div>
	<div id="boardHud" class="board-hud">
		<div class="board-presence">
			<button id="connectedUsersToggle" class="board-presence-toggle" type="button" aria-haspopup="true"
				aria-expanded="false">
				<img class="board-presence-icon" width="18" height="18" src="../users.svg?v={{version}}" alt="" />
				<span class="tool-name" hidden></span>
			</button>
			<div id="connectedUsersPanel" class="connected-users-panel connected-users-panel-hidden">
				<ul id="connectedUsersList" class="connected-users-list"></ul>
			</div>
		</div>
		<div id="boardStatusIndicator" class="board-status-card" role="status" aria-live="polite" hidden>
			<span class="board-status-icon" aria-hidden="true"></span>
			<div class="board-status-copy">
				<div id="boardStatusTitle" class="board-status-title"></div>
				<div id="boardStatusNotice" class="board-status-detail board-status-detail-hidden"></div>
			</div>
		</div>
	</div>

	<div id="menu" tabindex="0" {{#hideMenu}}style="display:none;"{{/hideMenu}}>
		<div id="menuItems">
			<ul id="tools" class="tools">
				{{#tools}}
				<li class="tool" tabindex="-1" id="toolID-{{name}}" data-tool-name="{{name}}" aria-label="{{label}}">
					<img class="tool-icon" width="35" height="35" src="{{iconUrl}}" alt="" aria-hidden="true" />
					<span class="tool-name">{{label}}</span>
					<img class="tool-icon secondaryIcon" width="35" height="35" src="data:," alt="" aria-hidden="true" />
				</li>
				{{/tools}}
			</ul>

			<ul class="tools" id="settings">
				<li class="tool" tabindex="-1">
					<input class="tool-icon" type="color" id="chooseColor" value="#1913B0" />
					<label class="tool-name" for="chooseColor">{{translations.color}}</label>
					<span class="colorPresets" id="colorPresetSel">
						<span class="colorPresetButton"></span>
					</span>
				</li>
				<li class="tool" tabindex="-1"
					title="{{translations.size}} ({{translations.keyboard_shortcut}}: alt + {{translations.mousewheel}})">
					<img class="tool-icon" width="60" height="60" src="../icon-size.svg?v={{version}}" alt="" aria-hidden="true" />
					<label class="tool-name slider" for="chooseSize">
						<span>{{translations.size}}</span>
						<input type="range" id="chooseSize" value="4" min="1" max="50" step="1" class="rangeChooser" />
					</label>
				</li>
				<li class="tool" tabindex="-1">
					<span class="tool-icon">
						<svg viewBox="0 0 8 8" aria-hidden="true" focusable="false">
							<defs>
								<clipPath id="opacityIndicatorClip">
									<circle cx="4" cy="4" r="3.5"></circle>
								</clipPath>
							</defs>
							<g clip-path="url(#opacityIndicatorClip)">
								<rect x="0" y="0" width="4" height="4" fill="#111111"></rect>
								<rect x="4" y="0" width="4" height="4" fill="#eeeeee"></rect>
								<rect x="0" y="4" width="4" height="4" fill="#eeeeee"></rect>
								<rect x="4" y="4" width="4" height="4" fill="#111111"></rect>
								<circle cx="4" cy="4" id="opacityIndicatorFill" r="3.5" fill="#1913B0"></circle>
							</g>
							<circle cx="4" cy="4" id="opacityIndicator" r="3.5" fill="none" stroke="#333333" stroke-width="0.3"></circle>
						</svg>
					</span>
					<label class="tool-name slider" for="chooseOpacity">
						<span>{{translations.opacity}}</span>
						<input type="range" id="chooseOpacity" value="1" min="0.2" max="1" step="0.1"
							class="rangeChooser" />
					</label>
				</li>
				</ul>
			</div>
		</div>

	<script type="application/json" id="translations">{{{ json translations }}}</script>
	<script type="application/json" id="configuration">{{{ json configuration }}}</script>
	<script type="application/json" id="board-state">{{{ json boardState }}}</script>
	<script>
		(() => {
			const root = document.documentElement;
			const earlyChrome =
				window.__wboEarlyChrome ||
				(window.__wboEarlyChrome = {
					pendingToolName: null,
					connectedUsersPanelOpen: false,
				});
			const toolButtons = Array.from(
				document.querySelectorAll("#tools > .tool[data-tool-name]"),
			).filter((element) => element instanceof HTMLElement);

			function updatePendingToolUi(toolName) {
				toolButtons.forEach((button) => {
					button.classList.toggle("curTool", button.dataset.toolName === toolName);
				});
			}

			function requestTool(toolName) {
				earlyChrome.pendingToolName = toolName;
				root.dataset.pendingTool = toolName;
				updatePendingToolUi(toolName);
				const tools = window.Tools;
				if (tools && typeof tools.activateTool === "function") {
					void tools.activateTool(toolName);
				}
			}

			toolButtons.forEach((button) => {
				if (button.dataset.toolBound === "true") return;
				const toolName = button.dataset.toolName;
				if (!toolName) return;
				button.dataset.toolBound = "true";
				button.addEventListener("click", () => {
					requestTool(toolName);
				});
				button.addEventListener("keydown", (evt) => {
					if (evt.key === "Enter" || evt.key === " ") {
						evt.preventDefault();
						requestTool(toolName);
					}
				});
			});

			if (!root.dataset.pendingTool) {
				const defaultButton =
					toolButtons.find((button) => button.dataset.toolName === "Hand") ||
					toolButtons[0];
				const toolName = defaultButton?.dataset.toolName;
				if (toolName) {
					earlyChrome.pendingToolName = toolName;
					root.dataset.pendingTool = toolName;
				}
			}
			if (root.dataset.pendingTool) {
				updatePendingToolUi(root.dataset.pendingTool);
			}

			const toggle = document.getElementById("connectedUsersToggle");
			const panel = document.getElementById("connectedUsersPanel");
			if (!(toggle instanceof HTMLElement) || !(panel instanceof HTMLElement)) {
				return;
			}

			function setConnectedUsersPanelOpen(open) {
				earlyChrome.connectedUsersPanelOpen = open;
				panel.classList.toggle("connected-users-panel-hidden", !open);
				toggle.classList.toggle("board-presence-toggle-open", open);
				toggle.setAttribute("aria-expanded", open ? "true" : "false");
			}

			if (toggle.dataset.connectedUsersUiBound !== "true") {
				toggle.dataset.connectedUsersUiBound = "true";
				toggle.addEventListener("click", () => {
					const tools = window.Tools;
					if (tools && typeof tools.setConnectedUsersPanelOpen === "function") {
						tools.setConnectedUsersPanelOpen(!tools.connectedUsersPanelOpen);
						return;
					}
					setConnectedUsersPanelOpen(toggle.getAttribute("aria-expanded") !== "true");
				});
				toggle.addEventListener("blur", () => {
					window.setTimeout(() => {
						if (
							!panel.matches(":hover") &&
							!panel.contains(document.activeElement) &&
							document.activeElement !== toggle
						) {
							setConnectedUsersPanelOpen(false);
						}
					}, 0);
				});
				panel.addEventListener("keydown", (evt) => {
					if (evt.key === "Escape") {
						evt.preventDefault();
						setConnectedUsersPanelOpen(false);
						toggle.focus();
					}
				});
			}
			setConnectedUsersPanelOpen(earlyChrome.connectedUsersPanelOpen === true);
		})();
	</script>
	<script type="module" src="../js/board_main.js?v={{version}}"></script>

	<div id="board">
		{{{inlineBoardSvg}}}
	</div>
</body>

</html>
